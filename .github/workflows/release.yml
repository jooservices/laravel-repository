name: Release

# Packagist publishing requires this repository secret:
# - PACKAGIST_TOKEN: a Packagist API token with update-package access

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  PHP_VERSION: '8.5'

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: pcov

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4

      - name: Run tests
        run: composer test

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

  publish:
    name: Publish To Packagist
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    env:
      PACKAGIST_USERNAME: jooservices
      PACKAGIST_UPDATE_URL: https://packagist.org/api/update-package
      PACKAGE_REPOSITORY_URL: https://github.com/jooservices/laravel-repository
    steps:
      - name: Validate Packagist secrets
        env:
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_TOKEN" ]; then
            echo "::error::Missing PACKAGIST_TOKEN repository secret"
            exit 1
          fi

      - name: Trigger Packagist update
        env:
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          curl --fail --show-error --silent \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 3 \
            --retry-all-errors \
            -X POST \
            -H 'content-type:application/json' \
            "${PACKAGIST_UPDATE_URL}?username=${PACKAGIST_USERNAME}" \
            -d "{\"repository\":{\"url\":\"${PACKAGE_REPOSITORY_URL}\"},\"api_token\":\"${PACKAGIST_TOKEN}\"}"
